<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#2563eb"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MedPro"/>
<link rel="manifest" href="manifest.json"/>
<title>MedPro — Professional Medical Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style> 
:root{
  /* MedPro Professional Theme */
  --primary:#0ea5e9;--primary2:#0284c7;--primary3:#38bdf8;
  --primary-g:linear-gradient(135deg,#0ea5e9,#06d6a0);
  --accent:#06d6a0;--accent2:#059669;
  --bg:#060d18;--s1:#07111f;--s2:#0a1a2e;--s3:#0d2040;
  --border:#0f2236;--border2:#163350;
  --green:#06d6a0;--green2:#34d399;--green-g:linear-gradient(135deg,#06d6a0,#059669);
  --red:#ef4444;--red2:#f87171;--red-g:linear-gradient(135deg,#ef4444,#dc2626);
  --yellow:#f59e0b;--yellow2:#fbbf24;
  --purple:#8b5cf6;--purple2:#a78bfa;
  --orange:#f97316;--orange2:#fb923c;
  --pink:#ec4899;--pink2:#f472b6;
  --teal:#14b8a6;--teal2:#2dd4bf;
  --indigo:#6366f1;--indigo2:#818cf8;
  --text:#e2f4ff;--text2:#7ab3cc;--text3:#2d6a99;
  --font:'Inter','Outfit',sans-serif;
  --font2:'Plus Jakarta Sans',sans-serif;
  --urdu:'Noto Nastaliq Urdu',serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;--sh:0 8px 32px rgba(0,0,0,.6);--sh2:0 2px 12px rgba(0,0,0,.4);--sh3:0 20px 60px rgba(0,0,0,.7);
}
.theme-animal{
  --primary:#22c55e;--primary2:#16a34a;--primary3:#4ade80;
  --primary-g:linear-gradient(135deg,#22c55e,#14b8a6);
  --bg:#050e08;--s1:#071510;--s2:#0a1e14;--s3:#0d2618;
  --border:#0f3018;--border2:#143d20;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.ld-ring{width:80px;height:80px;position:relative}
.ld-ring::before,.ld-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid transparent}
.ld-ring::before{border-top-color:var(--primary3);animation:spin 1s linear infinite}
.ld-ring::after{border-bottom-color:var(--accent);animation:spin .7s linear infinite reverse;inset:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.ld-title{font-size:20px;font-weight:800}
.ld-sub{font-size:13px;color:var(--text3);font-family:var(--mono)}
.ld-bar{width:220px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;background:var(--primary-g);border-radius:99px;animation:ldA 1.8s ease-in-out infinite}
@keyframes ldA{0%{width:0}50%{width:60%}100%{width:100%}}

/* LOGIN */
#loginScreen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none}
.orb1{width:600px;height:600px;background:var(--primary);opacity:.08;top:-200px;left:-200px;animation:orbF 10s ease-in-out infinite}
.orb2{width:500px;height:500px;background:var(--purple);opacity:.07;bottom:-150px;right:-150px;animation:orbF 13s ease-in-out infinite reverse}
.orb3{width:350px;height:350px;background:var(--green);opacity:.06;top:40%;left:40%;animation:orbF 8s ease-in-out infinite 3s}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.login-card{position:relative;z-index:10;background:rgba(7,17,31,.94);border:1px solid rgba(14,165,233,.15);border-radius:24px;padding:44px 40px;width:440px;max-width:95vw;backdrop-filter:blur(32px);box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px rgba(14,165,233,.08)}
.login-logo{width:76px;height:76px;background:var(--primary-g);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;box-shadow:0 16px 40px rgba(14,165,233,.35);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 16px 40px rgba(14,165,233,.35)}50%{box-shadow:0 20px 50px rgba(14,165,233,.55),0 0 0 10px rgba(14,165,233,.08)}}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand h1{font-size:28px;font-weight:900;background:var(--primary-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-brand p{font-size:13px;color:var(--text3);margin-top:5px;font-family:var(--font2)}
.fld{margin-bottom:18px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-family:var(--font2)}
.fld input{width:100%;padding:14px 18px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:.25s}
.fld input:focus{border-color:var(--primary3);background:rgba(37,99,235,.06);box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.fld input::placeholder{color:var(--text3)}
.login-btn{width:100%;padding:14px;background:var(--primary-g);border:none;border-radius:13px;color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:.3s;box-shadow:0 8px 28px rgba(14,165,233,.3);letter-spacing:.02em}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(14,165,233,.45)}
.lerr{color:var(--red2);font-size:13px;text-align:center;margin-top:12px;font-weight:600;min-height:20px}

/* APP */
#app{display:none}
.sb{position:fixed;left:0;top:0;width:240px;height:100vh;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-head{padding:14px 12px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(14,165,233,.08),rgba(6,214,160,.05))}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-logo-img{width:38px;height:38px;border-radius:11px;object-fit:cover;flex-shrink:0;border:2px solid rgba(14,165,233,.3);box-shadow:0 0 12px rgba(14,165,233,.2)}
.sb-logo-def{width:38px;height:38px;background:var(--primary-g);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 16px rgba(14,165,233,.3)}
.sb-bname{font-size:13px;font-weight:700;line-height:1.3;color:var(--text)}
.sb-bver{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.sb-user{margin:10px 10px 4px;padding:10px 12px;background:rgba(14,165,233,.06);border:1px solid rgba(14,165,233,.12);border-radius:12px;display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:10px;background:var(--primary-g);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(14,165,233,.3)}
.sb-uname{font-size:12px;font-weight:600;color:var(--text)}
.sb-urole{font-size:10px;color:var(--text3);margin-top:1px}
.sb-store-nm{font-size:9px;color:var(--accent);margin-top:2px;font-family:var(--mono)}
.sb-theme{margin:3px 10px 4px;display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px}
.tt-btn{padding:3px 9px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:600;cursor:pointer;transition:.2s}
.tt-btn.on{background:var(--primary-g);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(14,165,233,.3)}
.fb-stat{display:flex;align-items:center;gap:6px;font-size:10px;padding:5px 12px;border-radius:8px;margin:2px 10px 4px;font-weight:600;font-family:var(--font2)}
.fb-ok{background:rgba(6,214,160,.08);color:var(--green2);border:1px solid rgba(6,214,160,.2)}
nav{flex:1;padding:4px 8px;overflow-y:auto}
.nsec{padding:10px 8px 4px;font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;font-weight:600;font-family:var(--font2)}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:12px;color:var(--text2);transition:.2s;border-radius:10px;font-weight:500;margin-bottom:2px;position:relative;font-family:var(--font2)}
.ni:hover{color:var(--text);background:rgba(14,165,233,.08)}
.ni.on{color:#fff;background:rgba(14,165,233,.15);font-weight:600;box-shadow:inset 0 0 0 1px rgba(14,165,233,.2)}
.ni.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--primary-g);border-radius:0 4px 4px 0;box-shadow:0 0 8px rgba(14,165,233,.5)}
.ni-ic{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;padding:1px 7px;font-size:9px;font-weight:700;font-family:var(--mono);box-shadow:0 2px 6px rgba(239,68,68,.4)}
.sb-foot{padding:10px 8px;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:9px 12px;border-radius:10px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.05);color:var(--text3);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.logout-btn:hover{background:rgba(239,68,68,.12);color:var(--red2);border-color:rgba(239,68,68,.4)}
.topbar{margin-left:240px;position:sticky;top:0;z-index:100;background:rgba(6,13,24,.92);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.tb-left{flex:1;min-width:0}
.tb-title{font-size:16px;font-weight:800;letter-spacing:-.01em}
.tb-date{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.tb-badges{display:flex;gap:7px;flex-wrap:wrap}
.tbb{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--font2);white-space:nowrap;letter-spacing:.01em}
.tbb-r{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.tbb-y{background:rgba(245,158,11,.1);color:var(--yellow2);border:1px solid rgba(245,158,11,.2)}
.tbb-b{background:rgba(14,165,233,.1);color:#38bdf8;border:1px solid rgba(14,165,233,.2)}
.tbb-g{background:rgba(6,214,160,.1);color:#06d6a0;border:1px solid rgba(6,214,160,.2)}
.menu-btn{display:none;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;color:var(--text2);font-size:18px;line-height:1;flex-shrink:0}
.main{margin-left:240px;min-height:100vh}
.page{display:none;padding:14px 18px;animation:fadeUp .25s ease}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD */
.alert-strip{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:12px;margin-bottom:16px;font-size:12px;color:var(--yellow2);font-family:var(--font2);flex-wrap:wrap}
.alert-strip-btn{padding:5px 14px;border-radius:8px;border:1px solid rgba(245,158,11,.4);background:transparent;color:var(--yellow2);font-family:var(--font2);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;margin-left:auto;white-space:nowrap}
.alert-strip-btn:hover{background:rgba(245,158,11,.15)}
.whatsapp-btn{padding:5px 14px;border-radius:8px;border:1px solid rgba(37,211,102,.4);background:rgba(37,211,102,.1);color:#25d366;font-family:var(--font2);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.whatsapp-btn:hover{background:rgba(37,211,102,.2)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.sc{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;position:relative;overflow:hidden;cursor:pointer;transition:.25s;max-height:90px}
.sc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--sh)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0}
.sc.sb::before{background:var(--primary-g)}.sc.sg::before{background:var(--green-g)}
.sc.sy::before{background:linear-gradient(90deg,#f59e0b,#d97706)}.sc.sr::before{background:var(--red-g)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.sc-ico{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px}
.sc-val{font-size:20px;font-weight:900;font-family:var(--mono);line-height:1;margin-bottom:1px}
.sc-lbl{font-size:11px;color:var(--text3);font-weight:600;font-family:var(--font2);text-transform:uppercase;letter-spacing:.05em}
.sc-bar{margin-top:4px;height:2px;background:var(--border);border-radius:99px;overflow:hidden}
.sc-sparkline{margin-top:2px}
.quick-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.qs{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:7px 11px;display:flex;align-items:center;gap:8px;transition:.2s}
.qs:hover{border-color:var(--border2)}
.qs-ico{font-size:16px;flex-shrink:0}
.qs-val{font-size:13px;font-weight:700;font-family:var(--mono)}
.qs-lbl{font-size:10px;color:var(--text3);font-family:var(--font2)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.shdr h3{font-size:14px;font-weight:800;letter-spacing:-.01em}
.tw{background:var(--s2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh2)}
.tw table{width:100%;border-collapse:collapse}
.tw thead th{background:rgba(7,17,31,.9);padding:10px 14px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--font2)}
.tw tbody tr{border-bottom:1px solid var(--border);transition:.15s}
.tw tbody tr:last-child{border-bottom:none}
.tw tbody tr:hover{background:rgba(14,165,233,.04)}
.tw td{padding:10px 14px;font-size:12px;vertical-align:middle}
.mn{font-weight:700;color:var(--text);font-family:var(--font2)}
.ms{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--font2)}
.st{padding:3px 11px;border-radius:20px;font-size:9px;font-weight:600;white-space:nowrap;font-family:var(--font2);letter-spacing:.02em}
.st-g{background:rgba(6,214,160,.1);color:#06d6a0;border:1px solid rgba(6,214,160,.2)}
.st-y{background:rgba(245,158,11,.1);color:var(--yellow2);border:1px solid rgba(245,158,11,.2)}
.st-r{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.btn{padding:8px 16px;border-radius:9px;border:none;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;line-height:1;letter-spacing:.01em}
.btn-p{background:var(--primary-g);color:#fff;box-shadow:0 4px 14px rgba(14,165,233,.25)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,233,.35)}
.btn-s{background:var(--green-g);color:#fff;box-shadow:0 4px 14px rgba(6,214,160,.2)}
.btn-s:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,214,160,.3)}
.btn-d{background:var(--red-g);color:#fff;box-shadow:0 4px 14px rgba(239,68,68,.2)}
.btn-d:hover{transform:translateY(-1px)}
.btn-g{background:rgba(14,165,233,.06);color:var(--text2);border:1px solid rgba(14,165,233,.15)}
.btn-g:hover{background:rgba(14,165,233,.12);color:var(--text);border-color:rgba(14,165,233,.3)}
.btn-warn{background:rgba(245,158,11,.1);color:var(--yellow2);border:1px solid rgba(245,158,11,.25)}
.btn-warn:hover{background:rgba(245,158,11,.18)}
.bsm{padding:4px 10px;border-radius:8px;border:none;font-family:var(--font2);font-size:10px;font-weight:700;cursor:pointer;transition:.15s;line-height:1}
.bsm-e{background:rgba(37,99,235,.13);color:#93c5fd}.bsm-e:hover{background:rgba(37,99,235,.22)}
.bsm-d{background:rgba(239,68,68,.13);color:var(--red2)}.bsm-d:hover{background:rgba(239,68,68,.22)}
.bsm-s{background:rgba(16,185,129,.13);color:var(--green2)}.bsm-s:hover{background:rgba(16,185,129,.22)}
.fc{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--sh2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg .fw{grid-column:1/-1}
.fgrp{display:flex;flex-direction:column;gap:7px}
.fgrp label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--font2)}
.fgrp input,.fgrp select,.fgrp textarea{background:rgba(7,17,31,.8);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:.2s;width:100%}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,.12);background:rgba(14,165,233,.04)}
.fgrp input::placeholder,.fgrp textarea::placeholder{color:var(--text3)}
.fgrp select option{background:var(--s1)}
.urdu-input{font-family:var(--urdu)!important;direction:rtl;text-align:right;font-size:15px!important}
.fact{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.msg{font-size:12px;padding:10px 14px;border-radius:11px;margin-top:12px;display:none;font-weight:600;font-family:var(--font2)}
.msg-ok{background:rgba(16,185,129,.12);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.msg-err{background:rgba(239,68,68,.12);color:var(--red2);border:1px solid rgba(239,68,68,.2)}

/* PHOTO */
.photo-sec{background:var(--s1);border:1.5px solid var(--border);border-radius:11px;padding:14px}
.photo-preview{width:100%;height:120px;border-radius:9px;object-fit:cover;display:none;margin-bottom:8px;border:1px solid var(--border)}
.photo-preview.show{display:block}
.photo-ph{width:100%;height:80px;border:2px dashed var(--border2);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--text3);font-size:11px;margin-bottom:8px;cursor:pointer;transition:.2s;font-family:var(--font2)}
.photo-ph:hover{border-color:var(--primary3);color:var(--text2)}
.photo-btns{display:flex;gap:7px}
.photo-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--font2);font-size:10px;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.photo-btn:hover{background:rgba(37,99,235,.1);color:var(--primary3);border-color:var(--primary3)}

/* PRICE CALC */
.price-calc{background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.2);border-radius:11px;padding:14px;margin-top:4px}
.price-calc-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-family:var(--font2)}
.price-calc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.price-calc-row label{font-size:11px;color:var(--text2);font-family:var(--font2);width:120px;flex-shrink:0}
.price-calc-row input{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:.25s;width:100%}
.price-calc-row input:focus{border-color:var(--primary3)}
.price-result{display:flex;gap:10px;margin-top:10px;padding:10px;background:var(--s1);border-radius:9px}
.price-res-item{flex:1;text-align:center}
.price-res-val{font-size:16px;font-weight:800;font-family:var(--mono)}
.price-res-lbl{font-size:10px;color:var(--text3);font-family:var(--font2);margin-top:2px}



/* PANEL COLORS - Har panel ka alag color */
.panel-blue{border-top:2px solid var(--primary)!important}
.panel-purple{border-top:2px solid var(--purple)!important}
.panel-teal{border-top:2px solid var(--teal)!important}
.panel-indigo{border-top:2px solid var(--indigo)!important}
.panel-green{border-top:2px solid var(--green)!important}
.panel-cyan{border-top:2px solid #06b6d4!important}
.panel-red{border-top:2px solid var(--red)!important}
.panel-orange{border-top:2px solid var(--orange)!important}
.panel-pink{border-top:2px solid var(--pink)!important}
.panel-gold{border-top:2px solid #f59e0b!important}

/* PAGE HEADER BADGES */
.ph-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--font2);margin-bottom:12px}
.ph-blue{background:rgba(14,165,233,.1);color:#38bdf8;border:1px solid rgba(14,165,233,.2)}
.ph-purple{background:rgba(139,92,246,.1);color:var(--purple2);border:1px solid rgba(139,92,246,.2)}
.ph-teal{background:rgba(20,184,166,.1);color:var(--teal2);border:1px solid rgba(20,184,166,.2)}
.ph-indigo{background:rgba(99,102,241,.1);color:var(--indigo2);border:1px solid rgba(99,102,241,.2)}
.ph-green{background:rgba(6,214,160,.1);color:var(--green2);border:1px solid rgba(6,214,160,.2)}
.ph-amber{background:rgba(245,158,11,.1);color:var(--yellow2);border:1px solid rgba(245,158,11,.2)}
.ph-red{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.ph-orange{background:rgba(249,115,22,.1);color:var(--orange2);border:1px solid rgba(249,115,22,.2)}
.ph-pink{background:rgba(236,72,153,.1);color:var(--pink2);border:1px solid rgba(236,72,153,.2)}
.ph-gold{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}

/* GLOBAL PROFIT SETTINGS */
.profit-settings-box{background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.15);border-radius:14px;padding:18px;margin-bottom:18px}
.profit-settings-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px;font-family:var(--font2)}
.profit-settings-sub{font-size:11px;color:var(--text3);margin-bottom:14px;font-family:var(--font2)}
.profit-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.profit-row label{font-size:11px;color:var(--text2);font-family:var(--font2);width:130px;flex-shrink:0}
.profit-row input{width:80px;background:var(--s1);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:.2s;text-align:center}
.profit-row input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(14,165,233,.12)}
.profit-row span{font-size:12px;color:var(--text3);font-family:var(--mono)}
.profit-toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.15);border-radius:10px;margin-top:4px;cursor:pointer;font-family:var(--font2);font-size:12px;color:var(--green2)}

/* DISCOUNT SYSTEM */
.disc-box{background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.2);border-radius:11px;padding:12px 14px;margin-top:10px}
.disc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;font-family:var(--font2)}
.disc-label{color:var(--text3)}
.disc-val{font-family:var(--mono);font-weight:600}
.disc-row.subtotal .disc-val{color:var(--text2)}
.disc-row.discount-row .disc-val{color:var(--red2)}
.disc-row.nettotal{padding-top:8px;border-top:1px solid var(--border);margin-top:5px}
.disc-row.nettotal .disc-label{font-weight:800;font-size:13px;color:var(--text)}
.disc-row.nettotal .disc-val{font-size:15px;font-weight:900;color:var(--green2)}
.disc-input-wrap{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.disc-input-wrap label{font-size:10px;color:var(--text3);font-family:var(--font2);white-space:nowrap}
.disc-input-wrap input{width:90px;background:var(--s1);border:1.5px solid var(--border);border-radius:9px;padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:.25s}
.disc-input-wrap input:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(139,92,246,.12)}

/* SCANNER */
.scan-box{border:2px dashed var(--border2);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:.25s;margin-bottom:18px;background:rgba(255,255,255,.015)}
.scan-box:hover{border-color:var(--primary3);background:rgba(37,99,235,.05)}
.scan-box.on{border-color:var(--green2);border-style:solid;background:rgba(16,185,129,.06)}
#qr1,#qr2{max-width:360px;margin:10px auto 0;border-radius:12px;overflow:hidden}

/* SALE */
.slayout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.bill{background:var(--s2);border:1px solid rgba(14,165,233,.12);border-radius:14px;padding:18px;box-shadow:var(--sh2)}
.bill-hdr{text-align:center;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.bill-hdr h3{font-size:17px;font-weight:700;background:var(--primary-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.01em}
.bill-hdr p{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.bi{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.bi-name{font-size:12px;font-weight:700;font-family:var(--font2)}
.bi-sub{font-size:10px;color:var(--text3);font-family:var(--font2)}
.btot{display:flex;justify-content:space-between;padding:12px 0 0;font-weight:800;font-size:14px;font-family:var(--font2)}
.bacts{margin-top:14px;display:flex;flex-direction:column;gap:8px}

/* ALERTS */
.al{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 15px;margin-bottom:8px;transition:.2s}
.al:hover{border-color:var(--border2)}
.al.ar{border-left:3px solid var(--red)}.al.ay{border-left:3px solid var(--yellow)}.al.ap{border-left:3px solid var(--purple)}
.al-ic{font-size:20px;flex-shrink:0}
.al-t{font-size:12px;font-weight:700;font-family:var(--font2)}
.al-s{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--font2)}

/* REPORTS */
.rcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.rcard{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.rnum{font-size:26px;font-weight:900;font-family:var(--mono);margin-bottom:5px}
.rlbl{font-size:11px;color:var(--text3);font-weight:600;font-family:var(--font2);text-transform:uppercase;letter-spacing:.05em}

/* SEARCH */
.srow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sbox{position:relative;flex:1;min-width:180px}
.sbox input{padding-left:36px;width:100%;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding-top:10px;padding-bottom:10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:.2s}
.sbox input:focus{border-color:var(--primary3)}
.sbox .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px}
.fsel{padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:11px;color:var(--text2);font-family:var(--font);font-size:12px;outline:none;cursor:pointer}
.ptabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.ptab{padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--font2);font-size:11px;font-weight:600;cursor:pointer;transition:.2s}
.ptab.on{background:rgba(37,99,235,.14);color:#93c5fd;border-color:rgba(37,99,235,.3)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center;padding:20px}
.mbg.on{display:flex}
.modal{background:var(--s2);border:1px solid rgba(14,165,233,.15);border-radius:18px;padding:24px;width:100%;max-width:540px;box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px rgba(14,165,233,.08);animation:fadeUp .22s ease}
.modal h3{font-size:16px;font-weight:800;margin-bottom:6px}
.modal p{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.7;font-family:var(--font2)}
.macts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.barw{display:flex;align-items:center;gap:8px}
.barbg{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;min-width:50px}
.barfill{height:100%;border-radius:99px;transition:width .5s}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:190}
.sb-overlay.on{display:block}
.cam-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.cam-modal.on{display:flex}
#camVideo{width:300px;height:300px;border-radius:18px;object-fit:cover;border:2px solid var(--primary3)}

/* SUPER ADMIN */
.sa-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sa-stat{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.sa-stat-num{font-size:30px;font-weight:900;font-family:var(--mono);margin-bottom:4px}
.sa-stat-lbl{font-size:11px;color:var(--text3);font-family:var(--font2);text-transform:uppercase;letter-spacing:.05em}
.store-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:10px;overflow:hidden;transition:.2s}
.store-card:hover{border-color:var(--border2)}
.store-card-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.store-av{width:44px;height:44px;border-radius:11px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.store-av-def{width:44px;height:44px;border-radius:11px;background:var(--primary-g);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.store-num{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:2px}
.store-name{font-size:13px;font-weight:700;font-family:var(--font2)}
.store-info{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.store-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono)}
.sb-active{background:rgba(16,185,129,.13);color:var(--green2)}
.sb-inactive{background:rgba(239,68,68,.13);color:var(--red2)}
.store-card-bot{display:flex;gap:0;border-top:1px solid var(--border)}
.store-detail{flex:1;padding:8px 12px;font-size:10px;color:var(--text3);font-family:var(--font2);border-right:1px solid var(--border)}
.store-detail:last-child{border-right:none}
.store-detail strong{display:block;font-size:12px;color:var(--primary3);font-family:var(--mono);margin-bottom:1px}

/* CSV IMPORT */
.csv-drop{border:2px dashed var(--border2);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:.25s;background:rgba(255,255,255,.015)}
.csv-drop:hover{border-color:var(--primary3);background:rgba(37,99,235,.05)}
.csv-drop.active{border-color:var(--green2);border-style:solid;background:rgba(16,185,129,.06)}
.preview-table{max-height:300px;overflow-y:auto;border-radius:12px;border:1px solid var(--border);margin-top:14px}

/* STAFF */
.staff-card{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:11px}
.staff-av{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}

@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}.slayout{grid-template-columns:1fr}}
@media(max-width:960px){.dgrid{grid-template-columns:1fr}.rcards{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}.fg .fw{grid-column:1}.quick-strip{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .sb{transform:translateX(-100%)}.sb.on{transform:translateX(0);box-shadow:4px 0 50px rgba(0,0,0,.6)}
  .main,.topbar{margin-left:0}.menu-btn{display:flex}
  .page{padding:14px 16px}.stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .topbar{padding:11px 14px;gap:9px}.tb-badges{display:none}
  .quick-strip{grid-template-columns:1fr 1fr}
  .sa-stats{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.sc-val{font-size:24px}.rcards{grid-template-columns:1fr}.tw{overflow-x:auto}.stats-grid{gap:8px}.quick-strip{grid-template-columns:1fr}}
@media print{.sb,.topbar,.no-print,.mbg,.cam-modal{display:none!important}.main{margin-left:0!important}body{background:#fff;color:#000}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="ld-ring"><div class="ld-icon">💊</div></div>
  <div class="ld-title">MedPro</div>
  <div class="ld-sub" id="ldTxt">Connecting...</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">💊</div>
      <h1>MedPro</h1>
      <p>Professional Medical Store Management</p>
    </div>
    <div class="fld"><label>Email Address</label><input type="email" id="lu" placeholder="Enter your email" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="fld"><label>Password</label><input type="password" id="lp" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">🔐 Login</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- CAMERA -->
<div class="cam-modal" id="camModal">
  <video id="camVideo" autoplay playsinline></video>
  <div style="display:flex;gap:12px">
    <button class="btn btn-s" onclick="capturePhoto()">📸 Take Photo</button>
    <button class="btn btn-g" onclick="closeCam()">✕ Cancel</button>
  </div>
  <canvas id="camCanvas" style="display:none"></canvas>
</div>

<!-- APP -->
<div id="app">
  <div class="sb-overlay" id="sbo" onclick="closeSB()"></div>
  <aside class="sb" id="sb">
    <div class="sb-head">
      <div class="sb-brand">
        <div id="sbLogoWrap"><div class="sb-logo-def">💊</div></div>
        <div><div class="sb-bname" id="sbStoreName">MedPro</div><div class="sb-bver">v10.0 Pro</div></div>
      </div>
    </div>
    <div class="sb-user">
      <div class="sb-av" id="sbAv">A</div>
      <div>
        <div class="sb-uname" id="sbN">Loading...</div>
        <div class="sb-urole" id="sbR">Role</div>
        <div class="sb-store-nm" id="sbSN"></div>
      </div>
    </div>
    <div class="sb-theme">
      <span style="font-size:10px;font-family:var(--font2);font-weight:600">Theme</span>
      <div style="display:flex;gap:5px">
        <button class="tt-btn on" id="thMed" onclick="setTheme('medical',this)">🏥</button>
        <button class="tt-btn" id="thAni" onclick="setTheme('animal',this)">🐄</button>
      </div>
    </div>
    <div class="fb-stat fb-ok">☁️ Firebase Connected</div>
    <nav id="mainNav">
      <!-- populated by JS based on role -->
    </nav>
    <div class="sb-foot"><button class="logout-btn" onclick="logout()">🚪 Logout</button></div>
  </aside>

  <div class="topbar">
    <button class="menu-btn" onclick="toggleSB()">☰</button>
    <div class="tb-left">
      <div class="tb-title" id="pgTitle">Dashboard</div>
      <div class="tb-date" id="pgDate"></div>
    </div>
    <div class="tb-badges" id="topBadges"></div>
  </div>

  <main class="main" id="mainContent">
    <!-- Pages populated by JS -->
  </main>
</div>

<!-- MODALS -->
<div class="mbg" id="editMbg">
  <div class="modal" style="max-width:580px;max-height:90vh;overflow-y:auto">
    <h3>✏️ Edit Medicine</h3>
    <input type="hidden" id="eid"/>
    <div style="margin-bottom:14px">
      <div class="photo-sec">
        <img id="editPP" class="photo-preview" src="" alt=""/>
        <div class="photo-ph" id="editPH" onclick="document.getElementById('editPI').click()"><div style="font-size:22px">🖼️</div><div style="font-size:11px">Click to upload</div></div>
        <input type="file" id="editPI" accept="image/*" onchange="handleEditPhoto(this)" style="display:none"/>
        <div class="photo-btns" style="margin-top:7px">
          <button class="photo-btn" onclick="document.getElementById('editPI').click()">📁 Upload</button>
          <button class="photo-btn" onclick="clearEditPhoto()" style="color:var(--red2)">🗑 Remove</button>
        </div>
      </div>
    </div>
    <div class="fg">
      <div class="fgrp fw"><label>Name</label><input type="text" id="en"/></div>
      <div class="fgrp"><label>Company</label><input type="text" id="eco"/></div>
      <div class="fgrp"><label>Formula</label><input type="text" id="efo"/></div>
      <div class="fgrp"><label>Batch</label><input type="text" id="eba"/></div>
      <div class="fgrp"><label>Barcode</label><input type="text" id="ebc"/></div>
      <div class="fgrp"><label>Type</label><select id="ety"><option>Tablet</option><option>Injection</option><option>Syrup</option><option>Capsule</option><option>Cream / Ointment</option><option>Drops</option><option>Other</option></select></div>
      <div class="fgrp"><label>Store</label><select id="est"><option>Medical Store</option><option>Animal Store</option></select></div>
      <div class="fgrp"><label>Purchase Price</label><input type="number" id="epu" min="0"/></div>
      <div class="fgrp"><label>Retail Price</label><input type="number" id="esa" min="0"/></div>
      <div class="fgrp"><label>Wholesale Price</label><input type="number" id="ewsa" min="0"/></div>
      <div class="fgrp"><label>Quantity</label><input type="number" id="eq" min="0"/></div>
      <div class="fgrp"><label>Shelf</label><input type="text" id="esh"/></div>
      <div class="fgrp fw"><label>Expiry Date</label><input type="date" id="eex"/></div>
    </div>
    <div class="macts">
      <button class="btn btn-g" onclick="clsM('editMbg')">Cancel</button>
      <button class="btn btn-p" onclick="saveEdit()">💾 Save Changes</button>
    </div>
    <div class="msg" id="editMsg"></div>
  </div>
</div>

<div class="mbg" id="editStoreMbg">
  <div class="modal" style="max-width:560px;max-height:90vh;overflow-y:auto">
    <h3>✏️ Edit Store</h3>
    <input type="hidden" id="esid"/>
    <div class="fg">
      <div class="fgrp"><label>Store Name (English)</label><input type="text" id="es-en"/></div>
      <div class="fgrp"><label>Store Name (Urdu)</label><input type="text" id="es-ur" class="urdu-input" placeholder="اردو نام"/></div>
      <div class="fgrp"><label>Owner Name</label><input type="text" id="es-owner"/></div>
      <div class="fgrp"><label>Phone</label><input type="text" id="es-phone"/></div>
      <div class="fgrp fw"><label>Address (English)</label><textarea id="es-addr-en" rows="2" style="background:var(--s1);border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%;resize:none"></textarea></div>
      <div class="fgrp fw"><label>Address (Urdu)</label><textarea id="es-addr-ur" rows="2" class="urdu-input" style="background:var(--s1);border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-family:var(--urdu);font-size:15px;outline:none;width:100%;resize:none;direction:rtl;text-align:right"></textarea></div>
    </div>
    <div class="macts">
      <button class="btn btn-g" onclick="clsM('editStoreMbg')">Cancel</button>

// STATUS — 30 days expiry, 5 units low stock
function getSt(exp){
  const t=new Date();t.setHours(0,0,0,0);
  const e=new Date(exp);const d=Math.floor((e-t)/86400000);
  if(d<0)return{label:'Expired',cls:'st-r',days:d};
  if(d<=EXPIRY_DAYS_LIMIT)return{label:'Near Expiry',cls:'st-y',days:d};
  return{label:'Good',cls:'st-g',days:d};
}

function updTop(){
  const ex=meds.filter(m=>getSt(m.expiry).days<0).length;
  const wn=meds.filter(m=>{const s=getSt(m.expiry);return s.days>=0&&s.days<=EXPIRY_DAYS_LIMIT}).length;
  const tbExp=document.getElementById('tbExp');const tbWarn=document.getElementById('tbWarn');const tbTot=document.getElementById('tbTot');
  if(tbExp)tbExp.textContent=ex+' Expired';
  if(tbWarn)tbWarn.textContent=wn+' Expiring';
  if(tbTot)tbTot.textContent=meds.length+' Meds';
}
function updABadge(){
  const n=meds.filter(m=>getSt(m.expiry).days<=EXPIRY_DAYS_LIMIT||m.qty<=LOW_STOCK_LIMIT).length;
  const el=document.getElementById('abadge');
  if(el)n>0?(el.textContent=n,el.style.display='inline'):el.style.display='none';
}

// DASHBOARD
function renderDash(){
  if(!CU||CU.isSuperAdmin)return;
  const ex=meds.filter(m=>getSt(m.expiry).days<0).length;
  const wn=meds.filter(m=>{const s=getSt(m.expiry);return s.days>=0&&s.days<=EXPIRY_DAYS_LIMIT}).length;
  const low=meds.filter(m=>m.qty>0&&m.qty<=LOW_STOCK_LIMIT).length;
  const total=meds.length;
  const good=meds.filter(m=>m.qty>0&&getSt(m.expiry).days>EXPIRY_DAYS_LIMIT).length;

  const dT=document.getElementById('dT');if(dT)dT.textContent=total;
  const dG=document.getElementById('dG');if(dG)dG.textContent=good;
  const dW=document.getElementById('dW');if(dW)dW.textContent=wn;
  const dE=document.getElementById('dE');if(dE)dE.textContent=ex;

  // Progress bars
  const barT=document.getElementById('barT');if(barT)barT.style.width=Math.min(100,total)+'%';
  const barG=document.getElementById('barG');if(barG)barG.style.width=(total>0?Math.round(good/total*100):0)+'%';
  const barW=document.getElementById('barW');if(barW)barW.style.width=(total>0?Math.round(wn/total*100):0)+'%';
  const barE=document.getElementById('barE');if(barE)barE.style.width=(total>0?Math.round(ex/total*100):0)+'%';

  // Alert strip
  const strip=document.getElementById('alertStrip');
  const stripTxt=document.getElementById('alertStripText');
  if(strip&&stripTxt){
    const msgs=[];
    if(ex>0)msgs.push(`🚫 ${ex} expired`);
    if(wn>0)msgs.push(`⏳ ${wn} near expiry`);
    if(low>0)msgs.push(`📦 ${low} low stock`);
    if(msgs.length>0){strip.style.display='flex';stripTxt.textContent=msgs.join(' · ');}
    else strip.style.display='none';
  }

  // Quick strip
  const today=new Date().toLocaleDateString();
  const ts=sales.filter(s=>new Date(s.date).toLocaleDateString()===today);
  const todayTotal=ts.reduce((a,s)=>a+s.total,0);
  const qsLow=document.getElementById('qsLow');if(qsLow)qsLow.textContent=low;
  const qsSales=document.getElementById('qsSales');if(qsSales)qsSales.textContent='Rs.'+todayTotal.toFixed(0);
  const qsBills=document.getElementById('qsBills');if(qsBills)qsBills.textContent=ts.length;

window.calcPrices=function(){
  const pu=parseFloat(document.getElementById('fpu')?.value)||0;
  const rPct=parseFloat(document.getElementById('fRetailPct')?.value)||defaultRetailPct;
  const wPct=parseFloat(document.getElementById('fWholesalePct')?.value)||defaultWholesalePct;
  const retail=Math.round(pu*(1+rPct/100));
  const wholesale=Math.round(pu*(1+wPct/100));
  const cr=document.getElementById('calcRetail');const cw=document.getElementById('calcWholesale');
  if(cr)cr.textContent='Rs. '+retail;if(cw)cw.textContent='Rs. '+wholesale;
  const fsa=document.getElementById('fsa');const fwsa=document.getElementById('fwsa');
  if(fsa&&!fsa.dataset.manual)fsa.value=retail||'';
  if(fwsa&&!fwsa.dataset.manual)fwsa.value=wholesale||'';
}

// DISCOUNT FUNCTIONS
function getDiscount(){
  const da=parseFloat(document.getElementById('discAmt')?.value)||0;
  return da;
}
window.calcDiscount=function(){
  const subtotal=cart.reduce((s,c)=>s+c.total,0);
  const disc=parseFloat(document.getElementById('discAmt')?.value)||0;
  // sync pct
  const pctEl=document.getElementById('discPct');
  if(pctEl&&subtotal>0) pctEl.value=disc>0?((disc/subtotal)*100).toFixed(1):'';
  updateDiscUI(subtotal,disc);
}
window.calcDiscountPct=function(){
  const subtotal=cart.reduce((s,c)=>s+c.total,0);
  const pct=parseFloat(document.getElementById('discPct')?.value)||0;
  const disc=Math.round((subtotal*pct)/100);
  const amtEl=document.getElementById('discAmt');
  if(amtEl)amtEl.value=disc>0?disc:'';
  updateDiscUI(subtotal,disc);
}
function updateDiscUI(subtotal,disc){
  const net=Math.max(0,subtotal-disc);
  const sub=document.getElementById('discSubtotal');const ds=document.getElementById('discShow');const nt=document.getElementById('discNet');
  if(sub)sub.textContent='Rs. '+subtotal;
  if(ds)ds.textContent='Rs. '+disc;
  if(nt)nt.textContent='Rs. '+net;
}
function resetDiscount(){
  const da=document.getElementById('discAmt');const dp=document.getElementById('discPct');
  if(da)da.value='';if(dp)dp.value='';
  updateDiscUI(0,0);
}

  const isWholesale=document.getElementById('saleWholesale')?.checked;
  if(!id||isNaN(qty)||qty<1){showMsg('sMsg','⚠️ Select medicine & enter quantity!','err');return;}
  const m=meds.find(x=>x.docId===id);if(!m)return;
  if(qty>m.qty){showMsg('sMsg','⚠️ Only '+m.qty+' in stock!','err');return;}
  const price=isWholesale?(m.wholesale||m.sale):m.sale;
  const saleType=isWholesale?'Wholesale':'Retail';
  const ex=cart.find(c=>c.id===id&&c.saleType===saleType);
  if(ex){if(ex.qty+qty>m.qty){showMsg('sMsg','⚠️ Not enough stock!','err');return;}ex.qty+=qty;ex.total=ex.qty*price;}
  else cart.push({id,name:m.name,qty,unitPrice:price,purchase:m.purchase,total:qty*price,saleType});
  showMsg('sMsg','✅ Added '+qty+'× '+m.name+' ('+saleType+')','ok');
  const sQty=document.getElementById('sQty');if(sQty)sQty.value='';updCartUI();
}
function updCartUI(){
  const div=document.getElementById('cartDiv');if(!div)return;
  if(!cart.length){div.innerHTML='<p style="text-align:center;color:var(--text3);font-size:12px;padding:18px;font-family:var(--font2)">Cart is empty</p>';const ct=document.getElementById('cartTot');if(ct)ct.textContent='Rs. 0';return;}

    <div style="display:flex;align-items:center;gap:9px"><span style="font-family:var(--mono);font-weight:700;color:#93c5fd;font-size:12px">Rs.${c.total}</span><button class="bsm bsm-d" onclick="rmCart(${i})">✕</button></div>
  </div>`).join('');

window.sendWhatsApp=function(){
  const sp=storeProfile;
  const phone=sp&&sp.phone?sp.phone.replace(/[^0-9]/g,''):'';
  const exp=meds.filter(m=>getSt(m.expiry).days<0);
  const warn=meds.filter(m=>{const s=getSt(m.expiry);return s.days>=0&&s.days<=EXPIRY_DAYS_LIMIT;});
  const low=meds.filter(m=>m.qty>0&&m.qty<=LOW_STOCK_LIMIT);
  let msg='💊 *MedPro Alert*\n━━━━━━━━━━━━━━\n';
  if(exp.length){msg+=`\n🚫 *Expired (${exp.length}):*\n`;exp.forEach(m=>msg+=`• ${m.name} — ${m.expiry}\n`);}
  if(warn.length){msg+=`\n⏳ *Near Expiry (${warn.length}):*\n`;warn.forEach(m=>msg+=`• ${m.name} — ${getSt(m.expiry).days} days left\n`);}
  if(low.length){msg+=`\n📦 *Low Stock (${low.length}):*\n`;low.forEach(m=>msg+=`• ${m.name} — ${m.qty} units left\n`);}
  if(!exp.length&&!warn.length&&!low.length)msg+='✅ All medicines are good!';
  msg+='\n━━━━━━━━━━━━━━\nMedPro System';
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

// CSV IMPORT
window.handleCSV=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){alert('CSV file is empty or invalid!');return;}
    const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const rows=lines.slice(1).map(l=>{
      const cols=l.split(',').map(c=>c.trim().replace(/"/g,''));
      const obj={};headers.forEach((h,i)=>obj[h]=cols[i]||'');return obj;
    }).filter(r=>r[headers[0]]);
    // Show preview
    const head=document.getElementById('csvHead');
    const body=document.getElementById('csvBody');
    const title=document.getElementById('csvPreviewTitle');
    const preview=document.getElementById('csvPreview');
    if(!head||!body||!title||!preview)return;
    title.textContent=`Preview — ${rows.length} medicines found`;
    head.innerHTML='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
    body.innerHTML=rows.slice(0,10).map(r=>'<tr>'+headers.map(h=>`<td style="font-size:11px;font-family:var(--font2)">${r[h]||'—'}</td>`).join('')+'</tr>').join('');
    if(rows.length>10)body.innerHTML+='<tr><td colspan="'+headers.length+'" style="text-align:center;color:var(--text3);font-size:11px;padding:10px">... and '+(rows.length-10)+' more</td></tr>';
    preview.style.display='block';
    preview.dataset.rows=JSON.stringify(rows);
    preview.dataset.headers=JSON.stringify(headers);
  };
  reader.readAsText(file);
}

window.importCSV=async function(){
  const preview=document.getElementById('csvPreview');if(!preview)return;
  const rows=JSON.parse(preview.dataset.rows||'[]');
  const headers=JSON.parse(preview.dataset.headers||'[]');
  if(!rows.length){showMsg('importMsg','⚠️ No data to import!','err');return;}
  showMsg('importMsg','⏳ Importing '+rows.length+' medicines...','ok');
  let success=0,failed=0;
  for(const r of rows){
    try{
      const name=r['Name']||r['name']||r['Medicine Name']||'';
      if(!name)continue;
      await addDoc(collection(db,'stores',storeId,'medicines'),{
        name,company:r['Company']||r['company']||'',
        formula:r['Formula']||r['formula']||'',
        batch:r['Batch']||r['batch']||r['Batch Number']||'',
        barcode:r['Barcode']||r['barcode']||'',
        type:r['Type']||r['type']||'Tablet',
        store:r['Store']||r['store']||'Medical Store',
        purchase:parseFloat(r['Purchase Price']||r['purchase']||0)||0,
        sale:parseFloat(r['Retail Price']||r['sale']||r['Sale Price']||0)||0,
        wholesale:parseFloat(r['Wholesale Price']||r['wholesale']||0)||0,
        qty:parseInt(r['Quantity']||r['qty']||0)||0,
        shelf:r['Shelf']||r['shelf']||'',

        photo:'',addedOn:new Date().toISOString(),addedBy:CU.display+' (CSV Import)'
      });
      success++;

  }
  showMsg('importMsg',`✅ Imported ${success} medicines! ${failed>0?failed+' failed.':''}`,success>0?'ok':'err');
}

window.addStore=async function(){
  const g=id=>document.getElementById(id)?.value.trim()||'';
  const snEn=g('sa-sname-en'),adEn=g('sa-addr-en'),oname=g('sa-oname'),phone=g('sa-phone'),email=g('sa-email'),pass=g('sa-pass');
  const semail=g('sa-semail'),spass=g('sa-spass');
  if(!snEn||!adEn||!oname||!phone||!email||!pass){showMsg('saMsg','⚠️ Fill all required (*) fields!','err');return;}
  if(pass.length<6){showMsg('saMsg','⚠️ Password 6+ characters!','err');return;}
  try{
    showMsg('saMsg','⏳ Creating store...','ok');
    const adminCred=await createUserWithEmailAndPassword(auth,email,pass);
    const adminUid=adminCred.user.uid;
    const storeData={storeNameEn:snEn,storeNameUr:g('sa-sname-ur'),addressEn:adEn,addressUr:g('sa-addr-ur'),ownerName:oname,phone,adminEmail:email,logo:saLogo,createdOn:new Date().toISOString(),active:true,plan:'free'};
    await setDoc(doc(db,'stores',adminUid),storeData);
    await setDoc(doc(db,'users',adminUid),{uid:adminUid,email,display:oname,role:'admin',storeId:adminUid,storeName:snEn,isAdmin:true,isSuperAdmin:false,phone});
    if(semail&&spass&&spass.length>=6){
      const sc=await createUserWithEmailAndPassword(auth,semail,spass);
      await setDoc(doc(db,'users',sc.user.uid),{uid:sc.user.uid,email:semail,display:'Staff - '+snEn,role:'staff',storeId:adminUid,storeName:snEn,isAdmin:false,isSuperAdmin:false});
    }
    showMsg('saMsg','✅ Store "'+snEn+'" created!\nAdmin: '+email+' / '+pass,'ok');
    ['sa-sname-en','sa-sname-ur','sa-addr-en','sa-addr-ur','sa-oname','sa-phone','sa-email','sa-pass','sa-semail','sa-spass'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    clearSALogo();loadSAStores();
  }catch(e){showMsg('saMsg','❌ '+(e.code==='auth/email-already-in-use'?'Email exists!':e.message),'err');}
}

async function loadSAStores(){
  try{
    const snap=await getDocs(collection(db,'stores'));
    const stores=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Get medicine counts
    let totalMeds=0;
    for(const s of stores){
      try{
        const mSnap=await getDocs(collection(db,'stores',s.id,'medicines'));
        s.medCount=mSnap.size;totalMeds+=mSnap.size;
      }catch(e){s.medCount=0;}
    }
    const active=stores.filter(s=>s.active!==false).length;
    // Update stats
    const saTotal=document.getElementById('sa-total');const saActive=document.getElementById('sa-active');const saMeds=document.getElementById('sa-meds');
    const tbStores=document.getElementById('tbStores');const tbActive=document.getElementById('tbActive');
    if(saTotal)saTotal.textContent=stores.length;if(saActive)saActive.textContent=active;if(saMeds)saMeds.textContent=totalMeds;
    if(tbStores)tbStores.textContent=stores.length+' Stores';if(tbActive)tbActive.textContent=active+' Active';
    const div=document.getElementById('saStoresList');if(!div)return;
    if(!stores.length){div.innerHTML='<p style="color:var(--text3);font-size:13px;font-family:var(--font2)">No stores yet. Add your first store!</p>';return;}
    div.innerHTML=stores.map((s,idx)=>`
      <div class="store-card">
        <div class="store-card-top">
          ${s.logo?`<img src="${s.logo}" class="store-av"/>`:'<div class="store-av-def">🏪</div>'}
          <div style="flex:1">
            <div class="store-num">#${idx+1}</div>
            <div class="store-name">${s.storeNameEn||'Unknown'}${s.storeNameUr?` <span style="font-family:var(--urdu);font-size:12px;color:var(--text3)">— ${s.storeNameUr}</span>`:''}</div>
            <div class="store-info">${s.ownerName||''} · ${s.adminEmail||''}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <span class="store-badge ${s.active!==false?'sb-active':'sb-inactive'}">${s.active!==false?'✅ Active':'❌ Inactive'}</span>
            <div style="display:flex;gap:5px">
              <button class="bsm bsm-e" onclick="openStoreEdit('${s.id}')">✏️ Edit</button>
              <button class="bsm bsm-d" onclick="deactivateStore('${s.id}','${s.storeNameEn||'Store'}')">🗑 Delete</button>
            </div>
          </div>
        </div>
        <div class="store-card-bot">
          <div class="store-detail"><strong>${s.phone||'—'}</strong>Phone</div>
          <div class="store-detail"><strong>${s.medCount||0}</strong>Medicines</div>
          <div class="store-detail"><strong>${s.createdOn?new Date(s.createdOn).toLocaleDateString('en-PK'):'—'}</strong>Date Added</div>
          <div class="store-detail" style="border-right:none"><strong style="font-size:11px">${(s.addressEn||'—').substring(0,20)}${s.addressEn?.length>20?'...':''}</strong>Address</div>
        </div>
      </div>`).join('');
  }catch(e){console.error(e);}
}

window.openStoreEdit=async function(storeDocId){
  try{
    const sp=await getDoc(doc(db,'stores',storeDocId));
    if(!sp.exists())return;
    const d=sp.data();
    document.getElementById('esid').value=storeDocId;
    document.getElementById('es-en').value=d.storeNameEn||'';
    document.getElementById('es-ur').value=d.storeNameUr||'';
    document.getElementById('es-owner').value=d.ownerName||'';
    document.getElementById('es-phone').value=d.phone||'';
    document.getElementById('es-addr-en').value=d.addressEn||'';
    document.getElementById('es-addr-ur').value=d.addressUr||'';
    document.getElementById('editStoreMbg').classList.add('on');
  }catch(e){alert('Error: '+e.message);}

window.saveStoreEdit=async function(){
  const id=document.getElementById('esid').value;
  const g=i=>document.getElementById(i)?.value.trim()||'';
  try{
    await updateDoc(doc(db,'stores',id),{storeNameEn:g('es-en'),storeNameUr:g('es-ur'),ownerName:g('es-owner'),phone:g('es-phone'),addressEn:g('es-addr-en'),addressUr:g('es-addr-ur'),updatedOn:new Date().toISOString()});

window.deactivateStore=function(storeDocId,name){
  openConf('Deactivate Store','Deactivate "'+name+'"? They will not be able to login.',async()=>{
    try{
      await updateDoc(doc(db,'stores',storeDocId),{active:false});
      const usersSnap=await getDocs(collection(db,'users'));
      for(const ud of usersSnap.docs){if(ud.data().storeId===storeDocId)await updateDoc(doc(db,'users',ud.id),{disabled:true});}
      loadSAStores();
    }catch(e){alert('Error: '+e.message);}
  });
}

window.openCam=async function(){try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});const v=document.getElementById('camVideo');if(v)v.srcObject=camStream;document.getElementById('camModal').classList.add('on');}catch(e){alert('Camera: '+e.message);}}

// BARCODE SCANNER
window.togScan=function(){
  if(qa){stopScan();return;}
  const qrDiv=document.getElementById('qr1');const scanA=document.getElementById('scanA');
  if(qrDiv)qrDiv.style.display='block';if(scanA)scanA.classList.add('on');
  if(scanA)scanA.innerHTML='<div style="color:var(--green2);font-weight:700;font-family:var(--font2);font-size:13px">📷 Scanning... Click to stop</div>';
  qr1=new Html5Qrcode('qr1');
  qr1.start({facingMode:'environment'},{fps:10,qrbox:240},code=>{
    const fbc=document.getElementById('fbc');if(fbc)fbc.value=code;
    const found=meds.find(m=>m.barcode===code);
    if(found){
      const fields={fn:'name',fco:'company',ffo:'formula',fty:'type',fst:'store',fpu:'purchase',fsa:'sale',fwsa:'wholesale',fsh:'shelf',fex:'expiry'};
      Object.entries(fields).forEach(([id,key])=>{const el=document.getElementById(id);if(el&&found[key]!==undefined)el.value=found[key]||'';});
      if(found.photo){currentPhoto=found.photo;const p=document.getElementById('photoPreview');const ph=document.getElementById('photoPH');if(p){p.src=found.photo;p.classList.add('show');}if(ph)ph.style.display='none';}
      calcPrices();
      showMsg('addMsg','📦 Medicine found! Update quantity.','ok');
    }else showMsg('addMsg','✅ Barcode: '+code,'ok');
    stopScan();
  },()=>{}).catch(()=>stopScan());
  qa=true;
}
function stopScan(){if(qr1)qr1.stop().catch(()=>{});const qrDiv=document.getElementById('qr1');const scanA=document.getElementById('scanA');if(qrDiv)qrDiv.style.display='none';if(scanA){scanA.classList.remove('on');scanA.innerHTML='<div style="font-size:32px;margin-bottom:8px">📷</div><div style="font-weight:700;font-size:14px;margin-bottom:3px;font-family:var(--font2)">Scan Barcode / QR Code</div><div style="font-size:11px;color:var(--text3);font-family:var(--font2)">Click to open camera — auto-fill all fields</div>';}qa=false;}
window.togSaleScan=function(){if(qa2){stopSaleScan();return;}const qrDiv=document.getElementById('qr2');const scanS=document.getElementById('scanS');if(qrDiv)qrDiv.style.display='block';if(scanS)scanS.classList.add('on');qr2=new Html5Qrcode('qr2');qr2.start({facingMode:'environment'},{fps:10,qrbox:200},code=>{const m=meds.find(x=>x.barcode===code&&x.qty>0);if(m){const sm=document.getElementById('sMed');if(sm)sm.value=m.docId;window.updPrev();showMsg('sMsg','✅ Found: '+m.name,'ok');}else showMsg('sMsg','⚠️ Not found: '+code,'err');stopSaleScan();},()=>{}).catch(()=>stopSaleScan());qa2=true;}
function stopSaleScan(){if(qr2)qr2.stop().catch(()=>{});const qrDiv=document.getElementById('qr2');const scanS=document.getElementById('scanS');if(qrDiv)qrDiv.style.display='none';if(scanS)scanS.classList.remove('on');qa2=false;}

// SETTINGS & GLOBAL PROFIT
window.previewProfit=function(){
  const r=parseFloat(document.getElementById('gRetailPct')?.value)||0;
  const w=parseFloat(document.getElementById('gWholesalePct')?.value)||0;
  const retail=Math.round(100*(1+r/100));
  const wholesale=Math.round(100*(1+w/100));
  const prev=document.getElementById('profitPreview');
  const pr=document.getElementById('prvRetail');
  const pw=document.getElementById('prvWholesale');
  if(prev)prev.style.display='block';
  if(pr)pr.textContent='Rs.'+retail;
  if(pw)pw.textContent='Rs.'+wholesale;
  // Also update add medicine form defaults
  defaultRetailPct=r;defaultWholesalePct=w;
  const fRPct=document.getElementById('fRetailPct');
  const fWPct=document.getElementById('fWholesalePct');
  if(fRPct)fRPct.value=r;if(fWPct)fWPct.value=w;
}

window.saveGlobalProfit=async function(){
  const r=parseFloat(document.getElementById('gRetailPct')?.value)||20;
  const w=parseFloat(document.getElementById('gWholesalePct')?.value)||10;
  try{
    await setDoc(doc(db,'stores',storeId,'settings','pricing'),{retailPct:r,wholesalePct:w,updatedOn:new Date().toISOString()});
    defaultRetailPct=r;defaultWholesalePct=w;
    showMsg('settingsMsg','✅ Profit settings saved! New medicines will use these % automatically.','ok');
  }catch(e){showMsg('settingsMsg','❌ Error: '+e.message,'err');}
}

window.applyProfitToAll=function(){
  const r=parseFloat(document.getElementById('gRetailPct')?.value)||20;
  const w=parseFloat(document.getElementById('gWholesalePct')?.value)||10;
  openConf('Apply to ALL Medicines',
    'This will recalculate Retail & Wholesale prices for ALL '+meds.length+' medicines using Retail '+r+'% and Wholesale '+w+'% profit. Are you sure?',
    async()=>{
      try{
        showMsg('settingsMsg','⏳ Updating all medicines...','ok');
        let updated=0;
        for(const m of meds){
          const retail=Math.round(m.purchase*(1+r/100));
          const wholesale=Math.round(m.purchase*(1+w/100));
          await updateDoc(doc(db,'stores',storeId,'medicines',m.docId),{sale:retail,wholesale:wholesale});
          updated++;
        }
        showMsg('settingsMsg','✅ All '+updated+' medicines updated with new profit %!','ok');
      }catch(e){showMsg('settingsMsg','❌ Error: '+e.message,'err');}
    }
  );
}

window.saveStoreSettings=async function(){
  const g=id=>document.getElementById(id)?.value.trim()||'';

    await updateDoc(doc(db,'stores',storeId),{
      storeNameEn:g('set-en'),storeNameUr:g('set-ur'),
      ownerName:g('set-owner'),phone:g('set-phone'),
      addressEn:g('set-addr-en'),addressUr:g('set-addr-ur'),
      updatedOn:new Date().toISOString()
    });
    showMsg('storeSettingsMsg','✅ Store info saved!','ok');

    const sp=await getDoc(doc(db,'stores',storeId));

async function loadSettingsPage(){
  // Load profit settings
  try{
    const ps=await getDoc(doc(db,'stores',storeId,'settings','pricing'));
    if(ps.exists()){
      const d=ps.data();
      const gr=document.getElementById('gRetailPct');
      const gw=document.getElementById('gWholesalePct');
      if(gr)gr.value=d.retailPct||20;
      if(gw)gw.value=d.wholesalePct||10;
      previewProfit();
    }
  }catch(e){}
  // Load store info
  if(storeProfile){
    const g=id=>document.getElementById(id);
    if(g('set-en'))g('set-en').value=storeProfile.storeNameEn||'';
    if(g('set-ur'))g('set-ur').value=storeProfile.storeNameUr||'';
    if(g('set-owner'))g('set-owner').value=storeProfile.ownerName||'';
    if(g('set-phone'))g('set-phone').value=storeProfile.phone||'';
    if(g('set-addr-en'))g('set-addr-en').value=storeProfile.addressEn||'';
    if(g('set-addr-ur'))g('set-addr-ur').value=storeProfile.addressUr||'';
  }
}
